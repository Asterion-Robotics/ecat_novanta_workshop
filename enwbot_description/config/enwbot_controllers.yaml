controller_manager:
  ros__parameters:
    update_rate: 200  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    velocity_controller:
      type: velocity_controllers/JointGroupVelocityController 

    drive_reset_controller:
      type: gpio_controllers/GpioCommandController

drive_reset_controller:
  ros__parameters:
    gpios:
      - right_wheel_joint
    command_interfaces:
      right_wheel_joint:
        interfaces:
          - reset_fault

velocity_controller:
  ros__parameters:
    joints:
      - right_wheel_joint