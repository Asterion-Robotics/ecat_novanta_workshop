# Configuration file for EL6910
# Description : Auto-generated from 'ethercat -p <position> cstruct'
vendor_id: 0x00000002
product_id: 0x1afe3052
rpdo: # RxPDO = receive PDO Mapping, MASTER OUT SLAVE IN
  - index: 0x1600
    channels:
      - {index: 0x7000, sub_index: 0x01, type: int8} # FSoE Command
      - {index: 0x7001, sub_index: 0x01, type: int8} # SubIndex 001
      - {index: 0x7000, sub_index: 0x03, type: int16} # FSoE CRC 000
      - {index: 0x7000, sub_index: 0x02, type: int16} # FSoE Connection ID

  - index: 0x1601
    channels:
      - {index: 0x7010, sub_index: 0x01, type: int8} # FSoE Command
      - {index: 0x7011, sub_index: 0x01, type: int8} # SubIndex 001
      - {index: 0x7011, sub_index: 0x02, type: int8} # SubIndex 002
      - {index: 0x7010, sub_index: 0x03, type: int16} # FSoE CRC 000
      - {index: 0x7010, sub_index: 0x02, type: int16} # FSoE Connection ID

  - index: 0x17f0
    channels:
      - {index: 0xf788, sub_index: 0x00, type: int8, command_interface: safety_input_vars, default: 0} # Standard Inputs

  - index: 0x17ff
    channels:
      - {skip: true, index: 0x0000, sub_index: 0x00, type: int16} # Gap

tpdo: # TxPDO = transmit PDO Mapping, MASTER IN SLAVE OUT
  - index: 0x1a00
    channels:
      - {index: 0x6000, sub_index: 0x01, type: int8} # FSoE Command
      - {index: 0x6001, sub_index: 0x01, type: int8} # SubIndex 001
      - {index: 0x6000, sub_index: 0x03, type: int16} # FSoE CRC 000
      - {index: 0x6000, sub_index: 0x02, type: int16} # FSoE Connection ID

  - index: 0x1a01
    channels:
      - {index: 0x6010, sub_index: 0x01, type: int8} # FSoE Command
      - {index: 0x6011, sub_index: 0x01, type: int8} # SubIndex 001
      - {index: 0x6011, sub_index: 0x02, type: int8} # SubIndex 002
      - {index: 0x6010, sub_index: 0x03, type: int16} # FSoE CRC 000
      - {index: 0x6010, sub_index: 0x02, type: int16} # FSoE Connection ID

  - index: 0x1bff
    channels:
      - {index: 0xf100, sub_index: 0x01, type: int8, state_interface: safety_logic_state} # Safe Logic State
      - {index: 0xf100, sub_index: 0x02, type: int8} # Cycle Counter

sm: # Sync Manager
  - {index: 0, type: output, watchdog: disable }
  - {index: 1, type: input, watchdog: disable }
  - {index: 2, type: output, pdo: rpdo, watchdog: disable }
  - {index: 3, type: input, pdo: tpdo, watchdog: disable }
  - {index: 4, type: output, watchdog: disable }
  - {index: 5, type: input, watchdog: disable }
