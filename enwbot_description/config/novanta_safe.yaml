# Configuration file for Novanta drive
# Master 0, Slave 3
vendor_id: 0x0000029c
product_id: 0x03b11401
assign_activate: 0x0300 # DC Synch register
auto_fault_reset: true # true = automatic fault reset, false = fault reset on rising edge command interface "reset_fault"
#sdo: # sdo data to be transferred at drive startup
#  - { index: 0x60C2, sub_index: 1, type: int8, value: 10 } # Set interpolation time for cyclic modes to 10 ms
#  - { index: 0x60C2, sub_index: 2, type: int8, value: -3 } # Set base 10-3s
# Source: for communication area indices: https://doc.synapticon.com/circulo_safe_motion/sw5.1/object_dict/communication_area.html
sdo:
# Select "FSoE with Safety project CRC" slot (enables Safe Velocity in TxPDO)
  - { index: 0xF030, sub_index: 0x01, type: uint32, value: 0x03B00004 }
  
rpdo: # RxPDO = receive PDO Mapping, master (out) to slave (in) (MOSI)
  - index: 0x1600
    channels:
      - {
          index: 0x6040,
          sub_index: 0,
          type: uint16,
          command_interface: control_word,
          state_interface: control_word,
          default: 0,
        } # Control Word
      - {
          index: 0x607a,
          sub_index: 0,
          type: int32,
          command_interface: position,
          default: .nan,
        } # Target position
      - {
          index: 0x60ff,
          sub_index: 0,
          type: int32,
          command_interface: velocity,
          default: 0,
        } # Target velocity
      - {
          index: 0x6060,
          sub_index: 0,
          type: int8,
          command_interface: mode_of_operation,
          default: 8,
        } # Modes of operation
  - index: 0x1700
    channels:
      - { index: 0x6770, sub_index: 1, type: uint8 } # FSoE Master Command
      - { index: 0x6640, sub_index: 0, type: bool, state_interface: sto_cmd_state, mask: 1 } # STO Command
      - { index: 0x6650, sub_index: 1, type: bool, state_interface: ss1_cmd_state, mask: 2 } # SS1 Command
      - { skip: true, index: 0x0000, sub_index: 0, type: bit14 } # RxPadding
      - { skip: true, index: 0x6770, sub_index: 3, type: uint16 } # FSoE Master CRC_0
      - { skip: true, index: 0x6770, sub_index: 2, type: uint16 } # FSoE Master Connection ID

tpdo: # TxPDO = transmit PDO Mapping, slave (out) to master (in) (MISO)
  - index: 0x1a00
    channels:
      - {
          index: 0x6041,
          sub_index: 0,
          type: uint16,
          state_interface: status_word,
        } # Status Word
      - { index: 0x6064, sub_index: 0, type: int32, state_interface: position } # Position actual value
      - { index: 0x606c, sub_index: 0, type: int32, state_interface: velocity } # Velocity actual value
      - {
          index: 0x6061,
          sub_index: 0,
          type: int8,
          state_interface: mode_of_operation,
        } # Modes of operation display
  - index: 0x1b00
    channels:
      - { index: 0x6760, sub_index: 1, type: uint8 } # FSoE Slave Command
      - { skip: true, index: 0x6640, sub_index: 0, type: bool, mask: 1 } # STO state
      - { skip: true, index: 0x6650, sub_index: 1, type: bool, mask: 2 } # SS1 state
      - { skip: true, index: 0x0000, sub_index: 0, type: bit6 } # TxPadding
      - { index: 0x46d1, sub_index: 0, type: bool, state_interface: safe_inputs, mask: 1 } # Safe Inputs Value
      - { skip: true, index: 0x0000, sub_index: 0, type: bit7 } # TxPadding
      - { skip: true, index: 0x6760, sub_index: 3, type: uint16 } # FSoE Slave CRC_0
      - { skip: true, index: 0x6760, sub_index: 2, type: uint16 } # FSoE Slave Connection ID

sm: # Sync Manager
  - { index: 0, type: output, watchdog: disable }
  - { index: 1, type: input, watchdog: disable }
  - { index: 2, type: output, pdo: rpdo, watchdog: enable }
  - { index: 3, type: input, pdo: tpdo, watchdog: disable }